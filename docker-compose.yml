services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weepost
      POSTGRES_PASSWORD: weepost
      POSTGRES_DB: weepost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weepost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://weepost:weepost@postgres:5432/weepost?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
